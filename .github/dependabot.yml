version: 2
updates:
  # keep dev/runtime npm dependencies patched
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # @types/vscode must not exceed engines.vscode (^1.68.0), or `vsce package`
      # fails with "@types/vscode > engines.vscode". Keep it on the 1.68.x line;
      # raise it by hand together with engines.vscode when bumping the VS Code floor.
      - dependency-name: "@types/vscode"
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]
      # jest-mock-vscode 4.x requires @types/vscode ^1.90, which would force the
      # engine up. Stay on 3.x while we target VS Code 1.68.
      - dependency-name: "jest-mock-vscode"
        update-types: ["version-update:semver-major"]
      # @types/node must track the Node bundled with the supported VS Code
      # (engines.vscode ^1.68.0 -> Electron 17 -> Node 16). A higher major lets the
      # compiler accept Node APIs missing at runtime. Stay on 16.x; raise it by hand
      # together with engines.vscode when bumping the VS Code floor.
      - dependency-name: "@types/node"
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]
      # @vscode/test-electron 3.x requires Node >=22, out of step with the Node 16
      # runtime target. Stay on 2.x while we target VS Code 1.68.
      - dependency-name: "@vscode/test-electron"
        update-types: ["version-update:semver-major"]
    groups:
      # batch low-risk dev tooling bumps into one PR to reduce noise
      dev-dependencies:
        dependency-type: development

  # keep the GitHub Actions used by the workflows up to date
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
